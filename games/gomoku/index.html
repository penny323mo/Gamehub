<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku</title>
    <link rel="stylesheet" href="gomoku.css?v=cdb1150">
</head>

<body>
    <div class="switch-container gomoku-menu-container">
        <main class="switch-card">
            <h1>五子棋</h1>
            <div id="build-info" style="font-size: 0.7rem; color: #666; margin-top: -10px; margin-bottom: 20px;">
                <!-- Build info injected by build_info.js -->
            </div>
            <script src="build_info.js"></script>
            <script>
                // Display build info from GitHub Actions
                if (window.__BUILD__) {
                    const commitShort = window.__BUILD__.commit;
                    const commitTime = window.__BUILD__.commitTime.split(' +')[0];  // Remove timezone for brevity
                    document.getElementById('build-info').textContent = `Build: ${commitShort} | Commit: ${commitTime} (HKT)`;
                } else {
                    // Fallback for local dev
                    document.getElementById('build-info').textContent = 'Build: dev (local)';
                }
            </script>

            <!-- Landing Page / Game Selection -->
            <div id="landing-page">
                <div class="landing-actions">
                    <button id="gomoku-ai-btn" class="pill-btn mode-btn" data-action="ai" onclick="selectMode('ai')">對
                        AI 對戰</button>
                    <button id="gomoku-online-btn" class="pill-btn mode-btn" data-action="online"
                        onclick="selectMode('online')">ONLINE 對戰</button>
                    <button id="gomoku-back-btn" class="pill-btn secondary" data-action="back"
                        onclick="goToLauncher()">返回遊戲大廳</button>
                </div>
            </div>

            <!-- Game Container (Hidden on Landing) -->
            <div id="game-container" class="hidden">

                <!-- VS AI Specific Controls -->
                <div id="ai-controls" class="hidden">
                    <div class="controls-card">
                        <label for="difficulty">難度：</label>
                        <select id="difficulty" class="pill-select">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard" selected>Hard</option>
                        </select>
                        <button class="pill-btn secondary" onclick="backToLanding()">返回選單</button>
                    </div>
                </div>

                <!-- Online Lobby: 固定三房列表 -->
                <div id="online-lobby" class="hidden">
                    <h3>線上對戰大廳</h3>
                    <p style="font-size:0.8rem; color:#888; margin-bottom:15px;">選擇房間加入對戰</p>

                    <div id="room-list" class="room-list">
                        <!-- Room Cards -->
                        <div class="room-card" id="room-card-ROOM01">
                            <div class="room-name">🏠 ROOM 01</div>
                            <div class="room-info">
                                <span class="room-status" id="room-status-ROOM01">載入中...</span>
                                <span class="room-players" id="room-players-ROOM01">⚫ - / ⚪ -</span>
                            </div>
                            <button class="pill-btn room-join-btn" id="room-join-ROOM01"
                                onclick="joinFixedRoom('ROOM01')">加入</button>
                        </div>

                        <div class="room-card" id="room-card-ROOM02">
                            <div class="room-name">🏠 ROOM 02</div>
                            <div class="room-info">
                                <span class="room-status" id="room-status-ROOM02">載入中...</span>
                                <span class="room-players" id="room-players-ROOM02">⚫ - / ⚪ -</span>
                            </div>
                            <button class="pill-btn room-join-btn" id="room-join-ROOM02"
                                onclick="joinFixedRoom('ROOM02')">加入</button>
                        </div>

                        <div class="room-card" id="room-card-ROOM03">
                            <div class="room-name">🏠 ROOM 03</div>
                            <div class="room-info">
                                <span class="room-status" id="room-status-ROOM03">載入中...</span>
                                <span class="room-players" id="room-players-ROOM03">⚫ - / ⚪ -</span>
                            </div>
                            <button class="pill-btn room-join-btn" id="room-join-ROOM03"
                                onclick="joinFixedRoom('ROOM03')">加入</button>
                        </div>
                    </div>

                    <button class="pill-btn secondary" style="margin-top:20px;" onclick="backToLanding()">返回選單</button>
                </div>

                <!-- Online Room View (Board + Details) -->
                <div id="online-room" class="hidden">
                    <div class="room-header-card">
                        <div class="room-status">
                            <span class="label">房間：</span><span id="current-room-id" class="value">??????</span>
                            <span class="divider">|</span>
                            <span class="label">身份：</span><span id="my-role" class="value">載入中...</span>
                        </div>
                    </div>

                    <!-- Ready Status UI (Hidden until both players join) -->
                    <div id="ready-status" class="hidden"
                        style="margin:15px 0; padding:15px; background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3); border-radius:8px;">
                        <div class="ready-info"
                            style="display:flex; justify-content:space-around; margin-bottom:10px; font-size:0.9rem;">
                            <span id="black-ready-status">⚫ 黑：未準備</span>
                            <span id="white-ready-status">⚪ 白：未準備</span>
                        </div>
                        <button id="toggle-ready-btn" class="pill-btn" onclick="toggleReady()"
                            style="width:100%;">準備</button>
                    </div>

                    <!-- Game Over Actions (Rematch + Reset) -->
                    <div id="game-over-actions" class="hidden" style="margin:15px 0; display:flex; gap:10px;">
                        <button class="pill-btn" onclick="rematchGame()" style="flex:1;">🔄 再戰一局</button>
                        <button class="pill-btn danger-btn" onclick="resetFixedRoom()" style="flex:1;">🗑️ 重置房間</button>
                    </div>

                    <div id="waiting-msg" style="margin-bottom:10px; color:var(--neon-green);">等待對手加入...</div>

                    <div class="room-actions" style="margin-top:10px;">
                        <button id="leave-room-btn" class="pill-btn danger-btn" onclick="exitFixedRoom()">退出房間</button>
                    </div>
                </div>

                <!-- Common Game Elements (Board, Status) -->
                <div id="game-board-area" class="hidden">
                    <div id="board-wrap">
                        <div class="board-frame">
                            <canvas id="gomoku-board"></canvas>
                        </div>
                        <div id="boardLock" aria-hidden="true" title="Board Locked"></div>
                    </div>

                    <div id="status-bar"
                        style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                        <div id="status">當前回合：<span class="player-turn">黑子</span></div>

                        <!-- Online Controls (Timer + Pause) -->
                        <div id="online-controls" class="hidden online-controls-flex">
                            <span id="game-timer" class="timer-display">30</span>
                            <button id="pause-btn" class="pill-btn secondary"
                                style="font-size:0.8rem; padding:5px 10px;" onclick="togglePause()">暫停</button>
                        </div>
                    </div>

                    <!-- Only for AI mode, Online has its own restart logic -->
                    <button id="reset-btn" class="pill-btn action-btn" onclick="resetGame()">重新開始</button>
                </div>

            </div>
        </main>
    </div>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/js/online_utils.js"></script>
    <script src="js/core.js?v=d889aec"></script>
    <script src="js/renderer.js?v=d889aec"></script>
    <script src="js/ai.js?v=d889aec"></script>
    <script src="js/online.js?v=d889aec"></script>
    <script src="js/input.js?v=d889aec"></script>
    <script src="js/app.js?v=d889aec"></script>

    <!-- Debug Panel Removed (Production cleanup) -->
</body>

</html>
