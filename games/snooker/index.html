<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snooker 桌球</title>
    <link rel="stylesheet" href="snooker.css" />
</head>

<body>
    <div class="switch-container snooker-menu-container">
        <main class="switch-card">
            <h1>🎱 Snooker</h1>

            <!-- ── Landing Page ─────────────────────────────────────── -->
            <div id="landing-page">
                <div class="landing-actions">
                    <button class="pill-btn" onclick="selectMode('single')">🎯 單人模式</button>
                    <button class="pill-btn" onclick="selectMode('online')">🌐 線上對戰</button>
                    <button class="pill-btn secondary" onclick="location.href='../../index.html'">← 返回遊戲大廳</button>
                </div>
            </div>

            <!-- ── Game Container (hidden until mode selected) ─────── -->
            <div id="game-container" class="hidden">

                <!-- Single Player: 2D / 3D version selector -->
                <div id="single-version" class="hidden">
                    <h3>選擇版本</h3>
                    <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:4px;">選擇遊戲版本開始單人對局</p>
                    <div class="version-cards">
                        <a href="./2d/index.html" class="version-card card-2d">
                            <div class="version-icon">🎯</div>
                            <div class="version-title">2D 經典版</div>
                            <div class="version-desc">俯視角度<br>輕量快速<br>適合手機</div>
                        </a>
                        <a href="./3d/index.html" class="version-card card-3d">
                            <div class="version-icon">🌐</div>
                            <div class="version-title">3D 立體版</div>
                            <div class="version-desc">真實 3D 視角<br>自由旋轉鏡頭<br>沉浸式體驗</div>
                        </a>
                    </div>
                    <div class="controls-back">
                        <button class="pill-btn secondary" onclick="backToLanding()">← 返回選單</button>
                    </div>
                </div>

                <!-- Online Lobby: room list with 2D / 3D mode switcher -->
                <div id="snooker-online-lobby" class="hidden">
                    <h3>線上對戰大廳</h3>
                    <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:4px;">選擇版本及房間加入對戰</p>

                    <div class="mode-switcher">
                        <button class="mode-btn active" id="mode-btn-2d" onclick="switchOnlineMode('2d')">🎯 2D 版</button>
                        <button class="mode-btn" id="mode-btn-3d" onclick="switchOnlineMode('3d')">🌐 3D 版</button>
                    </div>

                    <div id="snooker-room-list" class="room-list">
                        <!-- Injected by buildRoomCards() -->
                    </div>

                    <div style="margin:10px 0 4px;display:flex;align-items:center;gap:8px;">
                        <label style="font-size:0.8rem;color:var(--text-muted);white-space:nowrap;" for="snooker-player-name">我的名稱：</label>
                        <input id="snooker-player-name" type="text" maxlength="12"
                            placeholder="最多12字" autocomplete="off"
                            style="flex:1;padding:5px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:#0d1a2e;color:#e7eefc;font-size:0.82rem;"
                            oninput="localStorage.setItem('snooker_player_name', this.value.trim() || 'Player')" />
                    </div>

                    <div class="controls-back">
                        <button class="pill-btn secondary" onclick="backToLanding()">← 返回選單</button>
                    </div>
                </div>


                <!-- Online Room View: ready / waiting state -->
                <div id="snooker-online-room" class="hidden">
                    <div class="room-header-card">
                        <div class="room-status-row">
                            <span class="label">房間：</span><span id="snooker-room-id" class="value">-</span>
                            <span class="divider">|</span>
                            <span class="label">身份：</span><span id="snooker-my-role" class="value">-</span>
                        </div>
                    </div>

                    <div id="snooker-waiting-msg">等待對手加入...</div>

                    <div id="snooker-ready-area">
                        <div class="ready-row">
                            <span id="snooker-p1-ready">P1：未準備</span>
                            <span id="snooker-p2-ready">P2：未準備</span>
                        </div>
                        <button class="pill-btn" id="snooker-ready-btn"
                            onclick="window.snookerToggleReady()" disabled
                            style="width:100%">準備</button>
                    </div>

                    <button class="pill-btn hidden" id="snooker-rematch-btn"
                        onclick="window.snookerRematch()"
                        style="margin-top:12px; width:100%">🔄 再戰一局</button>

                    <div style="margin-top:10px;">
                        <button class="pill-btn danger-btn" onclick="window.snookerExitRoom()"
                            style="width:100%">退出房間</button>
                    </div>
                </div>

            </div><!-- /game-container -->
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../shared/js/online_utils.js"></script>
    <script src="./online.js"></script>
    <script>
        // ── State ──────────────────────────────────────────────────────
        let currentOnlineMode = '2d';

        const ROOMS_MAP = {
            '2d': ['ROOM01', 'ROOM02', 'ROOM03'],
            '3d': ['3D-ROOM01', '3D-ROOM02', '3D-ROOM03'],
        };

        // ── View Management ────────────────────────────────────────────
        function showView(viewId) {
            ['single-version', 'snooker-online-lobby', 'snooker-online-room']
                .forEach(id => document.getElementById(id)?.classList.add('hidden'));

            const gc = document.getElementById('game-container');
            const lp = document.getElementById('landing-page');

            if (viewId === 'landing-page') {
                gc.classList.add('hidden');
                lp.classList.remove('hidden');
            } else {
                lp.classList.add('hidden');
                gc.classList.remove('hidden');
                document.getElementById(viewId)?.classList.remove('hidden');
            }
        }

        // ── Mode Selection ─────────────────────────────────────────────
        function selectMode(mode) {
            if (mode === 'single') {
                showView('single-version');
            } else {
                showView('snooker-online-lobby');
                buildRoomCards(currentOnlineMode);
                window.initSnookerOnline?.({ gameMode: currentOnlineMode });
            }
        }

        function backToLanding() {
            showView('landing-page');
        }

        // ── Online Mode Switcher ────────────────────────────────────────
        function switchOnlineMode(mode) {
            currentOnlineMode = mode;
            document.getElementById('mode-btn-2d').classList.toggle('active', mode === '2d');
            document.getElementById('mode-btn-3d').classList.toggle('active', mode === '3d');
            buildRoomCards(mode);
            window.initSnookerOnline?.({ gameMode: mode });
        }

        // ── Room Card Builder ──────────────────────────────────────────
        function buildRoomCards(mode) {
            const rooms = ROOMS_MAP[mode] || ROOMS_MAP['2d'];
            const list  = document.getElementById('snooker-room-list');
            list.innerHTML = rooms.map((key, i) => `
                <div class="room-card" id="snooker-room-card-${key}">
                    <div class="room-name">🏠 ROOM 0${i + 1}</div>
                    <div class="room-info">
                        <span class="room-status" id="snooker-room-status-${key}">載入中…</span>
                        <span class="room-players" id="snooker-room-players-${key}">P1:- / P2:-</span>
                    </div>
                    <button class="pill-btn room-join-btn" id="snooker-room-join-${key}"
                        onclick="window.snookerJoinRoom('${key}')">加入</button>
                </div>
            `).join('');
        }

        // ── Callbacks from online.js ───────────────────────────────────
        // When both players are ready and game starts, redirect to the
        // appropriate game page.  The game page picks up the room from
        // sessionStorage and auto-connects.
        window.snookerOnlineRoomUpdate = function ({ status } = {}) {
            if (status === 'playing') {
                const roomCode = window.snookerCurrentRoom?.room_code || '';
                sessionStorage.setItem('snooker_pending_room', roomCode);
                sessionStorage.setItem('snooker_pending_mode', currentOnlineMode);
                sessionStorage.setItem('snooker_pending_ts', String(Date.now()));
                // Suppress beforeunload seat-clearing during intentional redirect.
                // Use window.SnookerOnline (now exposed) instead of the const
                // which is not on window and was always 'undefined' here.
                if (window.SnookerOnline) {
                    window.SnookerOnline._intentionalRedirect = true;
                    // Auto-clear after 10 s so a failed redirect doesn't permanently
                    // suppress future seat cleanup from this tab.
                    setTimeout(() => {
                        if (window.SnookerOnline) window.SnookerOnline._intentionalRedirect = false;
                    }, 10000);
                }
                const dest = currentOnlineMode === '3d' ? './3d/index.html' : './2d/index.html';
                location.href = dest;
            } else if (status === 'left') {
                // Returned from room to lobby
                showView('snooker-online-lobby');
            }
        };

        // ── Init ───────────────────────────────────────────────────────
        buildRoomCards('2d');
        showView('landing-page');
        // Restore the saved player name into the input field
        const _savedName = localStorage.getItem('snooker_player_name');
        if (_savedName) {
            const _nameEl = document.getElementById('snooker-player-name');
            if (_nameEl) _nameEl.value = _savedName;
        }
    </script>
</body>

</html>
