<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snooker 3D MVP</title>
  <link rel="icon" href="./assets/ui/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./style.css?v=20260207c" />
  <style>
    .snk-overlay { position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:500; display:flex; align-items:center; justify-content:center; }
    .snk-overlay.hidden { display:none; }
    .snk-panel { background:#1a2030; border:1px solid #3a4a6a; border-radius:12px; padding:24px 28px; min-width:320px; max-width:500px; color:#eee; font-family:system-ui,sans-serif; }
    .snk-panel h2 { margin:0 0 16px; font-size:20px; color:#7ec8e3; }
    .snk-room-card { background:#222d40; border:1px solid #3a4a6a; border-radius:8px; padding:12px 14px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .snk-room-info { font-size:13px; color:#aaa; }
    .snk-room-info strong { color:#eee; font-size:14px; display:block; margin-bottom:2px; }
    .snk-btn { padding:7px 16px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
    .snk-btn-primary { background:#2a6bbf; color:#fff; }
    .snk-btn-primary:hover:not(:disabled) { background:#3a7bcf; }
    .snk-btn-secondary { background:#3a4a5a; color:#ddd; }
    .snk-btn-secondary:hover:not(:disabled) { background:#4a5a6a; }
    .snk-btn:disabled { opacity:.45; cursor:not-allowed; }
    .snk-ready-row { font-size:13px; color:#aaa; margin-bottom:10px; }
    #snk-game-status { font-size:13px; background:#2a3a50; border-radius:5px; padding:4px 10px; color:#7ec8e3; }
  </style>
</head>

<body>
  <!-- Online Lobby Overlay -->
  <div id="snk-online-lobby" class="snk-overlay hidden">
    <div class="snk-panel">
      <h2>Snooker 3D — 線上對戰</h2>
      <div id="snk-lobby-rooms">
        <div class="snk-room-card">
          <div class="snk-room-info"><strong>房間 1</strong><span id="snk-room-status-S3D_01">載入中…</span> | <span id="snk-room-players-S3D_01"></span></div>
          <button class="snk-btn snk-btn-primary" id="snk-room-join-S3D_01" onclick="snookerJoinRoom('S3D_01')">加入</button>
        </div>
        <div class="snk-room-card">
          <div class="snk-room-info"><strong>房間 2</strong><span id="snk-room-status-S3D_02">載入中…</span> | <span id="snk-room-players-S3D_02"></span></div>
          <button class="snk-btn snk-btn-primary" id="snk-room-join-S3D_02" onclick="snookerJoinRoom('S3D_02')">加入</button>
        </div>
        <div class="snk-room-card">
          <div class="snk-room-info"><strong>房間 3</strong><span id="snk-room-status-S3D_03">載入中…</span> | <span id="snk-room-players-S3D_03"></span></div>
          <button class="snk-btn snk-btn-primary" id="snk-room-join-S3D_03" onclick="snookerJoinRoom('S3D_03')">加入</button>
        </div>
      </div>
      <div style="margin-top:14px; text-align:right;">
        <button class="snk-btn snk-btn-secondary" onclick="document.getElementById('snk-online-lobby').classList.add('hidden')">取消</button>
      </div>
    </div>
  </div>

  <!-- Online Room Overlay -->
  <div id="snk-online-room" class="snk-overlay hidden">
    <div class="snk-panel">
      <h2>房間 <span id="snk-current-room-id">—</span> &nbsp;<span id="snk-game-status"></span></h2>
      <div style="font-size:13px; color:#aaa; margin-bottom:8px;">你的身份：<strong id="snk-my-role">—</strong></div>
      <div id="snk-waiting-msg" style="color:#facc15; margin-bottom:10px; display:none;"></div>
      <div id="snk-ready-area" class="snk-ready-row hidden">
        <div id="snk-p0-ready"></div>
        <div id="snk-p1-ready"></div>
        <button class="snk-btn snk-btn-primary" id="snk-ready-btn" style="margin-top:8px;" onclick="snookerToggleReady()" disabled>準備</button>
      </div>
      <div id="snk-game-over-actions" class="hidden" style="margin-top:14px;">
        <button class="snk-btn snk-btn-primary" onclick="snookerRematch()">再來一局</button>
      </div>
      <div style="margin-top:14px; text-align:right;">
        <button class="snk-btn snk-btn-secondary" onclick="snookerExitRoom()">離開房間</button>
      </div>
    </div>
  </div>

  <a href="../index.html" id="back-btn">← 返回</a>
  <button id="snk-online-btn" type="button" onclick="initSnookerOnline('3d');document.getElementById('snk-online-lobby').classList.remove('hidden');"
    style="position:fixed;top:12px;right:12px;z-index:100;padding:7px 14px;background:#2a6bbf;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">
    線上對戰
  </button>
  <canvas id="game" aria-label="Snooker 3D Canvas"></canvas>

  <div id="ui">
    <div id="hud">
      <div id="hud-essential">
        <div id="player-names">
          <label>P1: <input id="player1-name" type="text" placeholder="Player 1" value="P1" /></label>
          <label>P2:
            <select id="player2-mode">
              <option value="p2">Offline P2</option>
              <option value="ai" selected>AI</option>
            </select>
          </label>
          <button id="start-game-btn" type="button">開始遊戲</button>
        </div>
        <div id="score">Score: 0</div>
        <div id="turn">Turn: 1</div>
        <div id="status"></div>
        <div id="state-note"></div>
      </div>
      <div id="hud-hint-wrapper">
        <button id="hud-toggle" type="button" title="展開/縮細提示">▲</button>
        <div id="hint">
          P1 vs AI｜開球：LMB 拖放白球到 D 區 + 雙擊確認｜擊球：LMB 拖拽瞄準/力度，放開出桿｜犯規決策：Y 接手 / N 要求犯規方續打｜G 輔助線長度｜RMB 旋轉・滾輪縮放・C 重置鏡頭・R 重置・D
          Debug・F 全螢幕
        </div>
      </div>
      <div id="decision-panel" aria-live="polite" hidden>
        <div id="decision-text"></div>
        <div id="decision-actions">
          <button id="decision-take" type="button">接手 (Y)</button>
          <button id="decision-force" type="button">要求對手續打 (N)</button>
        </div>
      </div>
      <button id="confirm-cue-btn" type="button" hidden>確認白球位置</button>
    </div>
    <div id="power">
      <div id="power-label">Power</div>
      <div id="power-bar">
        <div id="power-fill"></div>
      </div>
    </div>
    <div id="spin-control" title="Drag to set spin">
      <div id="spin-marker"></div>
      <button id="spin-reset" type="button">Reset</button>
    </div>
    <!-- 手機專用儲力按鈕 (已移除，改用面板) -->
    <div id="mobile-controls" hidden>
      <!-- 左側：現有 Power Bar (使用 CSS 調整位置) -->
      <!-- 右側：蓄力鍵 -->
      <button id="mobile-charge-btn">HOLD<br>POWER</button>
    </div>
    <div id="debug-panel"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../online.js"></script>
  <script src="./assets/three/three.min.js?v=20260207b"></script>
  <script src="./assets/three/OrbitControls.legacy.js?v=20260207b"></script>
  <script src="./main.js?v=20260207b"></script>
</body>

</html>
