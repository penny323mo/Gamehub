<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snooker 3D MVP</title>
  <link rel="icon" href="./assets/ui/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./style.css?v=20260207c" />
  <style>
    #snooker3d-online-overlay{position:fixed;inset:0;z-index:200;background:rgba(5,10,20,.93);display:flex;align-items:center;justify-content:center}
    #snooker3d-online-overlay.hidden{display:none}
    .s3d-panel{background:#101a30;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:22px 26px;min-width:300px;max-width:400px;width:88%;color:#e7eefc;font-family:system-ui,sans-serif}
    .s3d-panel h2{margin:0 0 14px;font-size:1rem;color:#6aa6ff}
    .s3d-room-card{background:#0b1220;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .s3d-room-info{font-size:12px;color:#a9b6d6}
    .s3d-room-status{font-size:11px;color:#ffd66a;margin-top:2px}
    .s3d-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:#1a2a44;color:#e7eefc;cursor:pointer;font-size:12px}
    .s3d-btn:disabled{opacity:.4;cursor:default}
    .s3d-btn.primary{background:#2563eb;border-color:#3b82f6}
    .s3d-status-row{display:flex;gap:10px;margin:8px 0;font-size:12px;color:#a9b6d6}
    #snooker3d-waiting-msg{color:#ffd66a;font-size:12px;margin:6px 0}
    .s3d-hidden{display:none!important}
    .hidden{display:none!important}
  </style>
</head>

<body>
  <a href="../index.html" id="back-btn">← 返回</a>
  <canvas id="game" aria-label="Snooker 3D Canvas"></canvas>

  <!-- Online Overlay -->
  <div id="snooker3d-online-overlay" class="hidden">

    <!-- Lobby -->
    <div id="snooker3d-online-lobby" class="s3d-panel">
      <h2>線上對戰 — 選擇房間</h2>
      <div id="snooker3d-room-list">
        <div class="s3d-room-card">
          <div class="s3d-room-info"><div>ROOM01 &nbsp;<span id="snooker-room-players-3D-ROOM01">-</span></div><div class="s3d-room-status" id="snooker-room-status-3D-ROOM01">-</div></div>
          <button class="s3d-btn primary" id="snooker-room-join-3D-ROOM01" onclick="window.snookerJoinRoom('3D-ROOM01')">加入</button>
        </div>
        <div class="s3d-room-card">
          <div class="s3d-room-info"><div>ROOM02 &nbsp;<span id="snooker-room-players-3D-ROOM02">-</span></div><div class="s3d-room-status" id="snooker-room-status-3D-ROOM02">-</div></div>
          <button class="s3d-btn primary" id="snooker-room-join-3D-ROOM02" onclick="window.snookerJoinRoom('3D-ROOM02')">加入</button>
        </div>
        <div class="s3d-room-card">
          <div class="s3d-room-info"><div>ROOM03 &nbsp;<span id="snooker-room-players-3D-ROOM03">-</span></div><div class="s3d-room-status" id="snooker-room-status-3D-ROOM03">-</div></div>
          <button class="s3d-btn primary" id="snooker-room-join-3D-ROOM03" onclick="window.snookerJoinRoom('3D-ROOM03')">加入</button>
        </div>
      </div>
      <button class="s3d-btn" style="margin-top:8px;width:100%" onclick="document.getElementById('snooker3d-online-overlay').classList.add('hidden')">返回離線模式</button>
    </div>

    <!-- Room -->
    <div id="snooker3d-online-room" class="s3d-panel hidden">
      <h2>房間 <span id="snooker-room-id">-</span> &nbsp;|&nbsp; 你是 <span id="snooker-my-role">-</span></h2>
      <div id="snooker3d-waiting-msg" style="display:none">等待對手加入...</div>
      <div id="snooker-ready-area">
        <div class="s3d-status-row">
          <span id="snooker-p1-ready">P1: -</span>
          <span id="snooker-p2-ready">P2: -</span>
        </div>
        <button class="s3d-btn primary" id="snooker-ready-btn" onclick="window.snookerToggleReady()" disabled>準備</button>
      </div>
      <button class="s3d-btn hidden" id="snooker-rematch-btn" style="margin-top:10px;width:100%" onclick="window.snookerRematch()">再來一局</button>
      <button class="s3d-btn" style="margin-top:8px;width:100%" onclick="window.snookerExitRoom()">離開房間</button>
    </div>

  </div>

  <div id="ui">
    <div id="hud">
      <div id="hud-essential">
        <div id="player-names">
          <label>P1: <input id="player1-name" type="text" placeholder="Player 1" value="P1" /></label>
          <label>P2:
            <select id="player2-mode">
              <option value="p2">Offline P2</option>
              <option value="ai" selected>AI</option>
            </select>
          </label>
          <button id="start-game-btn" type="button">開始遊戲</button>
          <button id="online-battle-btn" type="button" style="background:#2563eb;border:1px solid #3b82f6;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px">🌐 線上對戰</button>
        </div>
        <div id="score">Score: 0</div>
        <div id="turn">Turn: 1</div>
        <div id="status"></div>
        <div id="state-note"></div>
      </div>
      <div id="hud-hint-wrapper">
        <button id="hud-toggle" type="button" title="展開/縮細提示">▲</button>
        <div id="hint">
          P1 vs AI｜開球：LMB 拖放白球到 D 區 + 雙擊確認｜擊球：LMB 拖拽瞄準/力度，放開出桿｜犯規決策：Y 接手 / N 要求犯規方續打｜G 輔助線長度｜RMB 旋轉・滾輪縮放・C 重置鏡頭・R 重置・D
          Debug・F 全螢幕
        </div>
      </div>
      <div id="decision-panel" aria-live="polite" hidden>
        <div id="decision-text"></div>
        <div id="decision-actions">
          <button id="decision-take" type="button">接手 (Y)</button>
          <button id="decision-force" type="button">要求對手續打 (N)</button>
        </div>
      </div>
      <button id="confirm-cue-btn" type="button" hidden>確認白球位置</button>
    </div>
    <div id="power">
      <div id="power-label">Power</div>
      <div id="power-bar">
        <div id="power-fill"></div>
      </div>
    </div>
    <div id="spin-control" title="Drag to set spin">
      <div id="spin-marker"></div>
      <button id="spin-reset" type="button">Reset</button>
    </div>
    <!-- 手機專用儲力按鈕 (已移除，改用面板) -->
    <div id="mobile-controls" hidden>
      <!-- 左側：現有 Power Bar (使用 CSS 調整位置) -->
      <!-- 右側：蓄力鍵 -->
      <button id="mobile-charge-btn">HOLD<br>POWER</button>
    </div>
    <div id="debug-panel"></div>
  </div>

  <script src="./assets/three/three.min.js?v=20260207b"></script>
  <script src="./assets/three/OrbitControls.legacy.js?v=20260207b"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../online.js?v=20260316a"></script>
  <script src="./main.js?v=20260207b"></script>
  <script>
    // Remap online.js room DOM IDs to 3d-prefixed equivalents for waiting/room views
    const _waitId  = document.getElementById('snooker3d-waiting-msg');
    const _roomId  = document.getElementById('snooker3d-online-room');
    const _lobbyId = document.getElementById('snooker3d-online-lobby');
    if (_waitId)  _waitId.id  = 'snooker-waiting-msg';
    if (_roomId)  _roomId.id  = 'snooker-online-room';
    if (_lobbyId) _lobbyId.id = 'snooker-online-lobby';

    // Init online module immediately (scripts are sync, DOM is ready at this point)
    if (window.initSnookerOnline) window.initSnookerOnline({ gameMode: '3d' });

    // "線上對戰" button opens the lobby overlay
    document.getElementById('online-battle-btn').addEventListener('click', () => {
      document.getElementById('snooker3d-online-overlay').classList.remove('hidden');
    });

    // Auto-connect when redirected from the snooker lobby (index.html)
    const _pendingRoom = sessionStorage.getItem('snooker_pending_room');
    if (_pendingRoom && sessionStorage.getItem('snooker_pending_mode') === '3d') {
      sessionStorage.removeItem('snooker_pending_room');
      sessionStorage.removeItem('snooker_pending_mode');
      // Show the overlay so the user sees the room state while the game
      // initialises, then snookerOnlineRoomUpdate('playing') hides it.
      document.getElementById('snooker3d-online-overlay').classList.remove('hidden');
      setTimeout(() => {
        if (window.snookerJoinRoom) window.snookerJoinRoom(_pendingRoom);
      }, 300);
    }
  </script>
</body>

</html>
